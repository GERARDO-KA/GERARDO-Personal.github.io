<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinematicTracker Pro v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <header class="border-b border-slate-800 bg-slate-950 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-emerald-400">Kinematic<span class="text-white font-normal">Tracker</span> <span class="text-xs text-slate-500">v2</span></h1>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 pb-24">
        
        <div class="bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
            <div class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                <span class="text-sm font-semibold flex items-center gap-2">
                    <span id="status-indicator" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                    Cámara en Vivo
                </span>
                <span id="coords-display" class="text-xs text-slate-400 font-mono">X: 0 | Y: 0</span>
            </div>
            
            <div class="relative bg-black aspect-video flex items-center justify-center overflow-hidden">
                <video id="video" playsinline autoplay muted class="absolute opacity-0 pointer-events-none w-px h-px"></video>
                <canvas id="canvas" class="w-full h-full object-contain cursor-crosshair"></canvas>
            </div>

            <div class="p-4 grid grid-cols-2 gap-3 bg-slate-900/50">
                <button id="btn-record" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-emerald-500/10">
                    Iniciar Rastreo
                </button>
                <button id="btn-reset" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 font-medium py-3 px-4 rounded-xl transition border border-slate-700">
                    Reiniciar
                </button>
            </div>
        </div>

        <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4 space-y-3 shadow-xl">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">Calibración Inteligente (HSL)</h2>
            <p class="text-xs text-slate-400">Toca el objeto en la pantalla. El sistema ahora rastrea el <b>tono del color</b>, ignorando los cambios de luz.</p>
            <div class="flex items-center gap-3 bg-slate-900 p-3 rounded-xl border border-slate-800">
                <div id="color-preview" class="w-10 h-10 rounded-lg border border-slate-700 bg-red-600"></div>
                <div class="text-xs font-mono text-slate-300">
                    Tono HSL Actual:<br>
                    <span id="hsl-text" class="text-emerald-400">H: 0°, S: 100%, L: 50%</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4 space-y-4 shadow-xl">
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-800">
                <canvas id="kinematicChart" class="w-full h-48"></canvas>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const btnRecord = document.getElementById('btn-record');
        const btnReset = document.getElementById('btn-reset');
        const colorPreview = document.getElementById('color-preview');
        const hslText = document.getElementById('hsl-text');
        const coordsDisplay = document.getElementById('coords-display');
        const statusIndicator = document.getElementById('status-indicator');

        let isTracking = false;
        let trackingData = []; 
        let startTime = 0;
        
        // Variables para la precisión y el suavizado (Filtro Low-Pass)
        let targetHue = 0; // Guardamos solo el Tono (0-360)
        let hueTolerance = 20; // Grados de tolerancia en el círculo cromático
        let lastSmoothX = null;
        let lastSmoothY = null;
        const smoothingFactor = 0.4; // 0.1 a 0.9 (Menor = más suavizado, Mayor = más respuesta cruda)

        // Inicializar Gráfica
        const chartCtx = document.getElementById('kinematicChart').getContext('2d');
        const kinematicChart = new Chart(chartCtx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Eje X (px)', data: [], borderColor: '#34d399', borderWidth: 2, pointRadius: 0 },
                { label: 'Eje Y (px)', data: [], borderColor: '#60a5fa', borderWidth: 2, pointRadius: 0 }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        // FIX 1: Inicialización robusta de cámara para móviles
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                
                // Esperamos a que los metadatos carguen para estar seguros de que hay dimensiones
                video.addEventListener('loadedmetadata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    video.play();
                    requestAnimationFrame(processFrame);
                });
            } catch (err) {
                alert("Verifica los permisos de cámara en tu navegador.");
            }
        }

        // Función matemática para convertir RGB a HSL
        function rgbToHsl(r, g, b) {
            r /= 255, g /= 255, b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max == min) { h = s = 0; } 
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }

        function processFrame() {
            if (video.paused || video.ended) return;

            // FIX 1.1: Prevenir errores si el video aún no renderiza
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = frame.data;

                let sumX = 0, sumY = 0, count = 0;

                // Escaneamos la matriz
                for (let i = 0; i < data.length; i += 16) { 
                    const r = data[i], g = data[i+1], b = data[i+2];
                    
                    // FIX 2: Usar HSL para ignorar la iluminación
                    const [h, s, l] = rgbToHsl(r, g, b);

                    // Ignorar blancos puros, negros puros y grises (baja saturación o luz extrema)
                    if (s > 25 && l > 15 && l < 85) {
                        // Calcular la diferencia circular del tono (Hue)
                        let hueDiff = Math.abs(h - targetHue);
                        if (hueDiff > 180) hueDiff = 360 - hueDiff;

                        if (hueDiff < hueTolerance) {
                            const pixelIndex = i / 4;
                            sumX += pixelIndex % canvas.width;
                            sumY += Math.floor(pixelIndex / canvas.width);
                            count++;
                        }
                    }
                }

                if (count > 20) {
                    let rawX = sumX / count;
                    let rawY = sumY / count;

                    // FIX 2.1: Filtro de Suavizado para quitar temblor
                    if (lastSmoothX === null) {
                        lastSmoothX = rawX; lastSmoothY = rawY;
                    } else {
                        lastSmoothX = (lastSmoothX * (1 - smoothingFactor)) + (rawX * smoothingFactor);
                        lastSmoothY = (lastSmoothY * (1 - smoothingFactor)) + (rawY * smoothingFactor);
                    }

                    ctx.beginPath();
                    ctx.arc(lastSmoothX, lastSmoothY, 15, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3; ctx.stroke();
                    ctx.fillStyle = '#34d399';
                    ctx.fillRect(lastSmoothX - 2, lastSmoothY - 10, 4, 20);
                    ctx.fillRect(lastSmoothX - 10, lastSmoothY - 2, 20, 4);

                    coordsDisplay.innerText = `X: ${Math.round(lastSmoothX)} | Y: ${Math.round(lastSmoothY)}`;

                    if (isTracking) {
                        const time = ((Date.now() - startTime) / 1000).toFixed(2);
                        const physicsY = canvas.height - lastSmoothY; // Invertir Y para la física
                        trackingData.push({ t: time, x: lastSmoothX, y: physicsY });
                    }
                } else {
                    coordsDisplay.innerText = "Buscando...";
                }
            }
            requestAnimationFrame(processFrame);
        }

        // Calibración tocando la pantalla
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const clickY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

            const pixel = ctx.getImageData(clickX, clickY, 1, 1).data;
            const [h, s, l] = rgbToHsl(pixel[0], pixel[1], pixel[2]);
            
            targetHue = h;
            colorPreview.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
            hslText.innerText = `H: ${Math.round(h)}°, S: ${Math.round(s)}%, L: ${Math.round(l)}%`;
        });

        // Controles de grabación
        btnRecord.addEventListener('click', () => {
            if (!isTracking) {
                isTracking = true; trackingData = []; startTime = Date.now();
                lastSmoothX = null; lastSmoothY = null; // Resetear el suavizado
                btnRecord.innerText = "Detener Análisis";
                btnRecord.classList.replace('bg-emerald-500', 'bg-red-500');
            } else {
                isTracking = false;
                btnRecord.innerText = "Iniciar Rastreo";
                btnRecord.classList.replace('bg-red-500', 'bg-emerald-500');
                
                kinematicChart.data.labels = trackingData.map(d => d.t);
                kinematicChart.data.datasets[0].data = trackingData.map(d => d.x);
                kinematicChart.data.datasets[1].data = trackingData.map(d => d.y);
                kinematicChart.update();
            }
        });

        btnReset.addEventListener('click', () => {
            trackingData = [];
            kinematicChart.data.labels = [];
            kinematicChart.data.datasets.forEach(d => d.data = []);
            kinematicChart.update();
        });

        window.onload = initCamera;
    </script>
</body>
</html>
